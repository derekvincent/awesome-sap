name: Awesome List Tag & Release

on:
  pull_request:
    types: [closed]

jobs:
  release:
    if: ${{ startsWith(github.event.pull_request.title, 'Awesome-List update') && github.event.pull_request.merged == true }}
    name: Run when automated Awesome List PR is merged
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set Version
        env:
          PR_REF: ${{ github.event.pull_request.head.ref }}
        run: echo "VERSION=${PR_REF##*/}" >> $GITHUB_ENV
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          name: "Update: ${{ env.VERSION }}"
          body_path: ./latest-changes.md
          draft: false
          prerelease: false

  deploy-pages:
    needs: release
    if: ${{ startsWith(github.event.pull_request.title, 'Awesome-List update') && github.event.pull_request.merged == true }}
    name: Deploy Web Version to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check if web build exists
        id: check_web
        run: |
          if [ -d "docs" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Setup Pages
        if: steps.check_web.outputs.exists == 'true'
        uses: actions/configure-pages@v5
      - name: Upload artifact
        if: steps.check_web.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs' # Adjust this if your generator uses a different output directory
      - name: Deploy to GitHub Pages
        if: steps.check_web.outputs.exists == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
